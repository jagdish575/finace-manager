<header class="fixed inset-x-0 top-0 z-50 border-b border-slate-200 bg-white/95 backdrop-blur-xl shadow-sm">
    <div class="mx-auto flex max-w-7xl items-center justify-between gap-6 px-4 py-4 sm:px-6 lg:px-8">
        <a href="{% url 'home' %}" class="flex items-center gap-3 text-lg font-semibold text-slate-900">
            <span class="inline-flex h-10 w-10 items-center justify-center rounded-2xl bg-brand-600 text-white shadow-soft">W</span>
            WealthWizard
        </a>
        <nav class="hidden items-center gap-8 text-sm font-medium text-slate-600 md:flex">
            <a href="{% url 'home' %}" class="transition hover:text-brand-600">Home</a>
            {% if request.user.is_authenticated %}
                <a href="{% url 'dashboard' %}" class="transition hover:text-brand-600">Dashboard</a>
                <a href="{% url 'transactions' %}" class="transition hover:text-brand-600">Transactions</a>
                <a href="{% url 'goals' %}" class="transition hover:text-brand-600">Goals</a>
                <a href="{% url 'group_expenses:group_expenses' %}" class="transition hover:text-brand-600">Group</a>
                <a href="{% url 'frontend_profile' %}" class="transition hover:text-brand-600">Profile</a>
            {% endif %}
        </nav>
        <div class="hidden items-center gap-3 md:flex">
            {% if request.user.is_authenticated %}
                <a href="{% url 'dashboard' %}" class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-50">Dashboard</a>
                <a href="{% url 'logout' %}" class="rounded-full bg-brand-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-brand-700">Logout</a>
            {% else %}
                <a href="{% url 'login' %}" class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-50">Login</a>
                <a href="{% url 'signup' %}" class="rounded-full bg-brand-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-brand-700">Get Started</a>
            {% endif %}
        </div>
    </div>
</header>
