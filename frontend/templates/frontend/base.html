{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WealthWizard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a'
                        },
                        surface: '#f8fafc',
                        accent: '#7c3aed'
                    },
                    boxShadow: {
                        soft: '0 35px 80px rgba(15,23,42,0.12)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        display: ['Poppins', 'system-ui', 'sans-serif'],
                    },
                },
            },
        };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
    <style>
        :root {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color-scheme: light;
            background-color: #eef2ff;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at top left, rgba(59,130,246,0.16), transparent 25%),
                        radial-gradient(circle at bottom right, rgba(167,139,250,0.14), transparent 22%),
                        linear-gradient(180deg, #ffffff 0%, #e2e8f0 100%);
            color: #0f172a;
        }
        .glass {
            background: rgba(255,255,255,0.84);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(226,232,240,0.85);
        }
        .hero-shadow {
            box-shadow: 0 35px 80px rgba(15, 23, 42, 0.12);
        }
        .btn-brand {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            background-color: #2563eb;
            padding: 0.75rem 1.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: #ffffff;
            transition: background-color .2s ease;
        }
        .btn-brand:hover {
            background-color: #1d4ed8;
        }
        .btn-outline-brand {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            border: 1px solid #2563eb;
            padding: 0.75rem 1.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: #2563eb;
            transition: background-color .2s ease, color .2s ease;
        }
        .btn-outline-brand:hover {
            background-color: rgba(59, 130, 246, 0.10);
        }
        .filter-btn {
            transition: transform .2s ease, box-shadow .2s ease, background-color .2s ease, color .2s ease;
        }
        .filter-btn.active {
            box-shadow: 0 18px 40px rgba(37, 99, 235, 0.18);
            transform: translateY(-1px);
        }
        .animate-card {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.55s ease, transform 0.55s ease;
        }
        .animate-card.visible {
            opacity: 1;
            transform: translateY(0);
        }
        a {
            text-decoration: none;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen antialiased text-slate-900">
    {% include 'frontend/nav.html' %}
    <main class="pt-20">
        {% block content %}{% endblock %}
    </main>
    {% include 'frontend/footer.html' %}
    <script src="{% static 'frontend/js/main.js' %}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
